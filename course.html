<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTP Cuber | Speedcubing Courses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='js/navbar.js' defer></script>
    <script src="js/navbar-auth.js" type="module"></script>
    <script src='js/footer.js' defer></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'Sarabun', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-black text-white selection:bg-blue-500/30">
    <my-navbar></my-navbar>
    
    <!-- Hero -->
    <section class="relative pt-32 pb-16 px-6 text-center">
        <div class="absolute inset-x-0 top-0 h-96 bg-blue-600/10 blur-[120px] rounded-full -z-10"></div>
        <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-4">Master Every Move</h1>
        <p class="text-neutral-400 text-lg max-w-2xl mx-auto">Structured video curriculums designed to take you from hobbyist to podium contender.</p>
    </section>

    <!-- Course Grid -->
    <section class="py-16 px-6">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Example Course Card -->
            <div class="bg-neutral-900 border border-neutral-800 rounded-2xl overflow-hidden hover:border-blue-500 transition group">
                <div class="aspect-video bg-neutral-800 relative">
                    <img src="image/course_thumb_zbll.jpg" alt="Course" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                        <span class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold">Preview Course</span>
                    </div>
                </div>
                <div class="p-6">
                    <div class="flex gap-2 mb-3">
                        <span class="text-[10px] bg-blue-600/20 text-blue-400 px-2 py-1 rounded uppercase font-bold">Advanced</span>
                        <span class="text-[10px] bg-neutral-800 text-neutral-400 px-2 py-1 rounded uppercase font-bold">12 Lessons</span>
                    </div>
                    <h3 class="text-xl font-bold mb-2">Mastering ZBLL: The Full Guide</h3>
                    <p class="text-neutral-400 text-sm mb-6">Learn 492 algorithms through pattern recognition and efficient fingertricks.</p>
                    <a href="learning-page.html" class="block text-center bg-neutral-800 hover:bg-blue-600 py-3 rounded-xl font-bold transition">Start Learning</a>
                </div>
            </div>
            <!-- Additional course cards would follow here -->
        </div>
    </section>
    <my-footer></my-footer>
</body>
</html>
