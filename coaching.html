<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTP Cuber | Professional Rubik's Cube Coaching</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src='js/langswitch.js' defer></script>
    <script src='js/coaching.js' defer></script>
    <script src='js/navbar.js' defer></script>
    <script src='js/footer.js' defer></script>

    <!-- <script>
    if (location.pathname.endsWith('.html')) {
      location.replace(location.pathname.replace('.html', ''));
    }
    </script> -->
</head>

<body class="bg-black text-white selection:bg-blue-500/30">

    <my-navbar></my-navbar>
    
    <section class="relative pt-32 pb-24 px-6 text-center">
        <div class="absolute inset-x-0 top-0 h-96 bg-blue-600/10 blur-[120px] rounded-full -z-10"></div>
        <div class="max-w-4xl mx-auto">
            <h1 id="main-title" class="text-5xl md:text-7xl font-bold tracking-tight mb-8"></h1>
            <p id="main-subtitle" class="text-neutral-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed"></p>
        </div>
    </section>

    <section id="why-me" class="py-24 px-6 bg-neutral-900/30">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                <div class="relative">
                    <div class="absolute -inset-4 bg-blue-600/20 blur-2xl rounded-full -z-10"></div>
                    <div class="bg-neutral-900 border border-neutral-800 p-2 rounded-3xl overflow-hidden">
                        <img src="image/coach_profile1.jpg" alt="Coach" class="w-full aspect-[4/5] object-cover rounded-2xl mb-8">
                        <div class="p-6">
                            <h2 class="text-3xl font-bold text-white mb-2" data-en="Natthaphat Mahtani" data-th="ณัฐภัทร มาทานี">Natthaphat Mahtani</h2>
                            <p class="text-blue-500 font-semibold mb-6" data-en="Thailand's best All-rounder" data-th="นักแข่งที่มีความสามารถรอบด้านมากที่สุดในไทย">Thailand’s best All-rounder</p>
                            <div class="space-y-4">
                                <h4 class="text-sm uppercase tracking-widest text-neutral-500 font-bold" data-en="Achievement Highlights" data-th="ผลงานโดดเด่น">Achievement Highlights</h4>
                                <ul class="space-y-3">
                                    <li class="flex items-start gap-3 text-neutral-300"><span class="text-blue-500">🏆</span> <p class="leading-relaxed" data-en="3x3 single peak ranking 9th global" data-th="สถิติรูบิก 3x3 เวลาเร็วที่สุดเคยเป็นอันดับ 9 ของโลก">3x3 single peak ranking 9th global</p></li>
                                    <li class="flex items-center gap-3 text-neutral-300"><span class="text-blue-500">🏅</span> <p class=""leading-relaxed data-en="Finalist in Continental Championship" data-th="เข้ารอบชิงในงานแข่งระดับทวีป">Finalist in Continental Championship</p></li>
                                    <li class="flex items-center gap-3 text-neutral-300"><span class="text-blue-500">⏱️</span> <p class=""leading-relaxed data-en="10+ years experience" data-th="ประสบการณ์กว่า 10 ปี">10+ years experience</p></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-4xl md:text-5xl font-bold mb-8" id="why-me-title"></h2>
                    <div id="benefits-list" class="space-y-8"></div>
                    <div class="mt-12 p-6 bg-blue-600/10 border border-blue-500/30 rounded-2xl inline-block">
                        <p class="text-blue-400 font-bold" data-en="Online Sessions Available" data-th="เปิดสอนแบบคลาสออนไลน์">Online Sessions Available</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="pricing" class="py-24 px-6">
        <div class="max-w-6xl mx-auto">
            <h2 id="pricing-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <div id="pricing-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <section id="book" class="py-24 px-6 bg-neutral-950 border-t border-neutral-900">
        <div class="max-w-3xl mx-auto">
            <h2 id="booking-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <form onsubmit="handleSubmit(event)" class="space-y-6" id="booking-wizard">
                
                
                <!-- Progress blocks (dynamic) -->
                <div class="mb-12">
                  <div id="progress-blocks" class="grid gap-3"></div>
                
                  <!-- Optional step labels (dynamic) -->
                  <div id="progress-labels" class="grid gap-3 mt-3 text-xs text-neutral-500"></div>
                </div>

                <div id="step-1" class="step-container space-y-6">
                    <select id="service-select" required class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>

                    <div id="video-group" class="hidden">
                        <label class="block mb-2 text-neutral-400">🔗 Video Link of your Solves</label>
                        <input type="url" id="video-link" placeholder="YouTube/Drive link" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl" />
                    </div>

                    <button type="button" onclick="nextStep(2)" class="w-full bg-blue-600 font-bold py-4 rounded-xl">Next</button>
                </div>

                <div id="step-2" class="step-container hidden space-y-6">
                    <div id="wca-group" class="hidden">
                        <label class="block mb-2 text-neutral-400">🏆 WCA Event</label>
                        <select id="wca-event" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl">
                            <option value="" data-en="Select event" data-th="เลือกประเภท">Select event</option>
                            <option>3x3</option>
                            <option>2x2</option>
                            <option>4x4</option>
                            <option>5x5</option>
                            <option>6x6</option>
                            <option>7x7</option>
                            <option>OH (One-Handed)</option>
                            <!-- <option>Blindfolded</option> -->
                            <option>Skewb</option>
                            <option>Pyraminx</option>
                            <option>Square-1</option>
                            <!-- <option>Clock</option> -->
                            <option>Megaminx</option>
                        </select>
                    </div>

                    <div id="availability-group" class="hidden">
                        <label class="block mb-3 text-neutral-400" data-en="📅 Available Day" data-th="📅 วันที่สะดวก">📅 Available Day</label>
                        <div id="available-date" class="flex flex-wrap gap-3">
                            <label class="cursor-pointer"><input type="checkbox" value="Mon" class="hidden peer"><span class="px-5 py-3 rounded-full bg-neutral-800 peer-checked:bg-blue-600 text-sm select-none" data-en="Mon" data-th="จันทร์">Mon</span></label>
                            <!-- <label class="cursor-pointer"><input type="checkbox" value="Tue" class="hidden peer"><span class="px-5 py-3 rounded-full bg-neutral-800 peer-checked:bg-blue-600 text-sm select-none" data-en="Tue" data-th="อังคาร">Tue</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="Wed" class="hidden peer"><span class="px-5 py-3 rounded-full bg-neutral-800 peer-checked:bg-blue-600 text-sm select-none" data-en="Wed" data-th="พุธ">Wed</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="Thu" class="hidden peer"><span class="px-5 py-3 rounded-full bg-neutral-800 peer-checked:bg-blue-600 text-sm select-none" data-en="Thu" data-th="พฤหัส">Thu</span></label> -->
                            <label class="cursor-pointer"><input type="checkbox" value="Fri" class="hidden peer"><span class="px-5 py-3 rounded-full bg-neutral-800 peer-checked:bg-blue-600 text-sm select-none" data-en="Fri" data-th="ศุกร์">Fri</span></label> 
                            <label class="cursor-pointer"><input type="checkbox" value="Sat" class="hidden peer"><span class="px-5 py-3 rounded-full bg-neutral-800 peer-checked:bg-blue-600 text-sm select-none" data-en="Sat" data-th="เสาร์">Sat</span></label>
                            <label class="cursor-pointer"><input type="checkbox" value="Sun" class="hidden peer"><span class="px-5 py-3 rounded-full bg-neutral-800 peer-checked:bg-blue-600 text-sm select-none" data-en="Sun" data-th="อาทิตย์">Sun</span></label>
                        </div>
                    </div>

                    <div id="time-group" class="hidden space-y-6">
                        <div>
                            <label class="block mb-2 text-neutral-400" data-en="⏰ Most Preferred Starting Time" data-th="⏰ เวลาที่สะดวกที่สุด">⏰ Most Preferred Starting Time</label>
                            <select id="preferred-time" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                        </div>
                        <div>
                            <label class="block mb-2 text-neutral-400" data-en="🕰️ Secondary Preferred Starting Time" data-th="🕰️ เวลาสำรองที่สะดวก">🕰️ Secondary Preferred Starting Time</label>
                            <select id="secondary-time" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button type="button" onclick="nextStep(1)" class="w-1/3 bg-neutral-800 font-bold py-4 rounded-xl">Back</button>
                        <button type="button" onclick="nextStep(3)" class="w-2/3 bg-blue-600 font-bold py-4 rounded-xl">Next</button>
                    </div>
                </div>

                <div id="step-3" class="step-container hidden space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="input-name" required placeholder="Your Name" class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:border-blue-500 outline-none w-full" />
                        <input type="email" id="input-email" required placeholder="Your Email" class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:border-blue-500 outline-none w-full" />
                    </div>

                    <div id="goal-group" class="hidden">
                        <label id="label-goal" class="block mb-2 text-neutral-400"></label>
                        <textarea id="input-goal" rows="3" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:border-blue-500 outline-none" placeholder="e.g., I want to sub-10 or learn full ZBLL"></textarea>
                    </div>

                    <div id="payment-group" class="space-y-6">
                        <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-8 text-center">
                            <h3 id="payment-text" class="text-xl font-bold mb-6"></h3>
                            <img id="qr-code-display" src="image/qr_payment.jpeg" alt="Payment QR" class="w-48 h-48 md:w-64 md:h-64 mx-auto bg-white p-2 rounded-xl object-contain">
                        </div>
                        <div>
                            <label id="receipt-upload-label" class="block text-sm text-neutral-400 mb-2"></label>
                            <input type="file" id="receipt-upload" accept="image/*" class="w-full bg-neutral-900 border border-neutral-800 p-3 rounded-xl file:bg-blue-600 file:border-0 file:rounded-full file:text-white file:px-4" />
                        </div>
                        <div class="flex items-start gap-3 p-4 bg-blue-600/5 border border-blue-500/20 rounded-xl">
                            <input type="checkbox" id="confirm-payment" onchange="toggleSubmitButton()" class="mt-1 w-5 h-5 rounded border-neutral-800 bg-neutral-900" />
                            <label for="confirm-payment" id="confirm-label" class="text-sm text-neutral-300 cursor-pointer"></label>
                        </div>
                    </div>

                    <!-- success booking message -->
                    <div id="success-msg" class="hidden text-center p-4 bg-green-500/10 border border-green-500/30 rounded-xl text-green-400 font-semibold"></div>

                    <div class="flex gap-4">
                        <button type="button" onclick="nextStep(2)" id="back-to-2" class="w-1/3 bg-neutral-800 font-bold py-4 rounded-xl">Back</button>
                        <button type="submit" id="submit-btn" class="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg"></button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <my-footer></my-footer>
</body>
</html>
