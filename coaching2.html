<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTP Cuber | Professional Rubik's Cube Coaching</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src='js/langswitch.js' defer></script>
    <script src='js/coaching2.js' defer></script>
    <script src='js/navbar.js' defer></script>
    <script src='js/footer.js' defer></script>

</head>
<body class="bg-black text-white selection:bg-blue-500/30">

    <my-navbar></my-navbar>
    
    <section class="relative pt-32 pb-24 px-6 text-center">
        <div class="absolute inset-x-0 top-0 h-96 bg-blue-600/10 blur-[120px] rounded-full -z-10"></div>
        <div class="max-w-4xl mx-auto">
            <h1 id="main-title" class="text-5xl md:text-7xl font-bold tracking-tight mb-8"></h1>
            <p id="main-subtitle" class="text-neutral-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed"></p>
        </div>
    </section>

    <section id="why-me" class="py-24 px-6 bg-neutral-900/30">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                <div class="relative">
                    <div class="absolute -inset-4 bg-blue-600/20 blur-2xl rounded-full -z-10"></div>
                    <div class="bg-neutral-900 border border-neutral-800 p-2 rounded-3xl overflow-hidden">
                        <img src="image/coach_profile.jpg" alt="Coach" class="w-full aspect-[4/5] object-cover rounded-2xl mb-8">
                        <div class="p-6">
                            <h2 class="text-3xl font-bold text-white mb-2">Natthaphat Mahtani</h2>
                            <p class="text-blue-500 font-semibold mb-6">Thailand’s best All-rounder</p>
                            <div class="space-y-4">
                                <h4 class="text-sm uppercase tracking-widest text-neutral-500 font-bold">Achievement Highlights</h4>
                                <ul class="space-y-3">
                                    <li class="flex items-center gap-3 text-neutral-300"><span class="text-blue-500">🏆</span> 3x3 single peak ranking 9th global</li>
                                    <li class="flex items-center gap-3 text-neutral-300"><span class="text-blue-500">🏅</span> Finalist in Continental Championship</li>
                                    <li class="flex items-center gap-3 text-neutral-300"><span class="text-blue-500">⏱️</span> 10+ years experience</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-4xl md:text-5xl font-bold mb-8" id="why-me-title"></h2>
                    <div id="benefits-list" class="space-y-8"></div>
                    <div class="mt-12 p-6 bg-blue-600/10 border border-blue-500/30 rounded-2xl inline-block">
                        <p class="text-blue-400 font-bold">Online / Onsite Sessions Available</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="pricing" class="py-24 px-6">
        <div class="max-w-6xl mx-auto">
            <h2 id="pricing-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <div id="pricing-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <section id="book" class="py-24 px-6 bg-neutral-950 border-t border-neutral-900">
        <div class="max-w-3xl mx-auto">
            <h2 id="booking-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <form onsubmit="handleSubmit(event)" class="space-y-6" id="booking-wizard">
                
                <div class="w-full bg-neutral-800 h-2 rounded-full mb-12 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-600 h-full w-1/3 transition-all duration-500"></div>
                </div>

                <div id="step-1" class="step-container space-y-6">
                    <select id="service-select" required class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                    
                    <div id="goal-group" class="hidden">
                        <label id="label-goal" class="block mb-2 text-neutral-400"></label>
                        <textarea id="input-goal" rows="3" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:border-blue-500 outline-none" placeholder="e.g., I want to sub-10 or learn full ZBLL"></textarea>
                    </div>

                    <div id="video-group" class="hidden">
                        <label class="block mb-2 text-neutral-400">🔗 Video Link of your Solves</label>
                        <input type="url" id="video-link" placeholder="YouTube/Drive link" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl" />
                    </div>

                    <button type="button" onclick="nextStep(2)" class="w-full bg-blue-600 font-bold py-4 rounded-xl">Next</button>
                </div>

                <div id="step-2" class="step-container hidden space-y-6">
                    <div id="wca-group" class="hidden">
                        <label class="block mb-2 text-neutral-400">🏆 WCA Event</label>
                        <select id="wca-event" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl">
                            </select>
                    </div>

                    <div id="availability-group" class="hidden">
                        <label class="block mb-3 text-neutral-400">📅 Available Day</label>
                        <div id="available-date" class="flex flex-wrap gap-3">
                            </div>
                    </div>

                    <div id="time-group" class="hidden space-y-6">
                        <div>
                            <label class="block mb-2 text-neutral-400">⏰ Most Preferred Starting Time</label>
                            <select id="preferred-time" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                        </div>
                        <div>
                            <label class="block mb-2 text-neutral-400">🕰️ Secondary Preferred Starting Time</label>
                            <select id="secondary-time" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button type="button" onclick="nextStep(1)" class="w-1/3 bg-neutral-800 font-bold py-4 rounded-xl">Back</button>
                        <button type="button" onclick="nextStep(3)" class="w-2/3 bg-blue-600 font-bold py-4 rounded-xl">Next</button>
                    </div>
                </div>

                <div id="step-3" class="step-container hidden space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="input-name" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:border-blue-500 outline-none" />
                        <input type="email" id="input-email" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:border-blue-500 outline-none" />
                    </div>

                    <div id="payment-group" class="space-y-6">
                        <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-8 text-center">
                            <h3 id="payment-text" class="text-xl font-bold mb-6"></h3>
                            <img id="qr-code-display" src="image/qr_payment.jpeg" alt="Payment QR" class="w-64 h-64 mx-auto bg-white p-2 rounded-xl object-contain">
                        </div>
                        <div>
                            <label id="receipt-upload-label" class="block text-sm text-neutral-400 mb-2"></label>
                            <input type="file" id="receipt-upload" accept="image/*" class="w-full bg-neutral-900 border border-neutral-800 p-3 rounded-xl file:bg-blue-600 file:border-0 file:rounded-full file:text-white file:px-4" />
                        </div>
                        <div class="flex items-start gap-3 p-4 bg-blue-600/5 border border-blue-500/20 rounded-xl">
                            <input type="checkbox" id="confirm-payment" onchange="toggleSubmitButton()" class="mt-1 w-5 h-5 rounded border-neutral-800 bg-neutral-900" />
                            <label for="confirm-payment" id="confirm-label" class="text-sm text-neutral-300 cursor-pointer"></label>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button type="button" onclick="nextStep(2)" id="back-to-2" class="w-1/3 bg-neutral-800 font-bold py-4 rounded-xl">Back</button>
                        <button type="submit" id="submit-btn" class="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg"></button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <my-footer></my-footer>
</body>
</html>
